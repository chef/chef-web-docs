## See Hugo's docs on module mounts: https://gohugo.io/hugo-modules/configuration/

noProxy = 'none'
noVendor = ''
private = '*.*'
proxy = 'direct'
#replacements = ''
vendorClosest = false
workspace = ''

###
# Chef Automate
###

[[imports]]
  disable = false
  ignoreConfig = false
  path = "github.com/chef/automate-private/components/docs-chef-io"

[[imports.mounts]]
  source = "data"
  target = "data"

[[imports.mounts]]
  source = "static/automate-api-docs"
  target = "static/automate-api-docs"


###
# Chef Desktop
###

[[imports]]
  disable = false
  ignoreConfig = false
  path = "github.com/chef/desktop-config/docs-chef-io"

[[imports.mounts]]
  source = "content"
  target = "content"

[[imports.mounts]]
  source = "static"
  target = "assets"

[[imports.mounts]]
  source = "data"
  target = "data"

[[imports.mounts]]
  source = "layouts"
  target = "layouts"

