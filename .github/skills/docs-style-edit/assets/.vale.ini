# Vale configuration for DevOps docs team
# Style packages: Google Developer Documentation Style Guide, Microsoft Writing Style Guide
#
# First-time setup:
#   1. Copy this file to the root of your docs repo
#   2. Run: vale sync
#   3. Add .vale/styles/ to your .gitignore
#
# Documentation: https://vale.sh/docs/

StylesPath = .vale/styles

# Packages downloaded when you run `vale sync`
# Google = Google Developer Documentation Style Guide
# Microsoft = Microsoft Writing Style Guide
Packages = Google, Microsoft

# Minimum severity to report.
# Options: suggestion | warning | error
# warning is recommended: catches style violations without noise from minor suggestions
MinAlertLevel = warning

# Apply rules to all Markdown files
[*.md]
BasedOnStyles = Vale, Google, Microsoft

# ── Rule overrides ────────────────────────────────────────────────────────────
# Uncomment to disable specific rules that don't apply to this team.
# Find rule names in vale output: package.RuleName (e.g. Google.WordList)

# Google.WordList = NO
# Google.Passive = NO
# Microsoft.Adverbs = NO
# Microsoft.Wordiness = NO
