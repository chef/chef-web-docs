name: chef-automate completion bash
synopsis: Generate the autocompletion script for bash
usage: chef-automate completion bash
description: |
    Generate the autocompletion script for the bash shell.

    This script depends on the 'bash-completion' package.
    If it is not installed already, you can install it via your OS's package manager.

    To load completions in your current shell session:

    	source <(chef-automate completion bash)

    To load completions for every new session, execute once:

    #### Linux:

    	chef-automate completion bash > /etc/bash_completion.d/chef-automate

    #### macOS:

    	chef-automate completion bash > $(brew --prefix)/etc/bash_completion.d/chef-automate

    You will need to start a new shell for this setup to take effect.
options:
    - name: help
      shorthand: h
      default_value: "false"
      usage: help for bash
    - name: no-descriptions
      default_value: "false"
      usage: disable completion descriptions
inherited_options:
    - name: debug
      shorthand: d
      default_value: "false"
      usage: Enable debug output
    - name: no-check-version
      default_value: "false"
      usage: Disable version check
    - name: result-json
      usage: Write command result as JSON to PATH
see_also:
    - chef-automate completion - Generate the autocompletion script for the specified shell
supported_on: Bastion
