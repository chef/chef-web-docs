name: chef-automate package-cleanup
synopsis: Remove unused Habitat packages from the system
usage: chef-automate package-cleanup [flags]
description: |-
    Remove unused Habitat packages from the system.

    This command identifies and removes Habitat packages that are not currently in use.
    It creates a whitelist of:
    - All currently running packages
    - All dependencies of running packages
    - Essential Habitat system packages (hab, hab-sup, hab-launcher, etc.)

    Any installed packages not in this whitelist will be removed.

    Examples:
      # Preview what would be deleted (dry-run mode)
      chef-automate package-cleanup --dry-run

      # Actually delete unused packages
      chef-automate package-cleanup

      # Delete with verbose output
      chef-automate package-cleanup --verbose
options:
    - name: dry-run
      default_value: "false"
      usage: Show what would be deleted without actually deleting
    - name: help
      shorthand: h
      default_value: "false"
      usage: help for package-cleanup
    - name: verbose
      shorthand: v
      default_value: "false"
      usage: Enable verbose output
inherited_options:
    - name: debug
      shorthand: d
      default_value: "false"
      usage: Enable debug output
    - name: no-check-version
      default_value: "false"
      usage: Disable version check
    - name: result-json
      usage: Write command result as JSON to PATH
see_also:
    - chef-automate - Chef Automate CLI
supported_on: Bastion
