name: chef-automate completion fish
synopsis: Generate the autocompletion script for fish
usage: chef-automate completion fish [flags]
description: |
    Generate the autocompletion script for the fish shell.

    To load completions in your current shell session:

    	chef-automate completion fish | source

    To load completions for every new session, execute once:

    	chef-automate completion fish > ~/.config/fish/completions/chef-automate.fish

    You will need to start a new shell for this setup to take effect.
options:
    - name: help
      shorthand: h
      default_value: "false"
      usage: help for fish
    - name: no-descriptions
      default_value: "false"
      usage: disable completion descriptions
inherited_options:
    - name: debug
      shorthand: d
      default_value: "false"
      usage: Enable debug output
    - name: no-check-version
      default_value: "false"
      usage: Disable version check
    - name: result-json
      usage: Write command result as JSON to PATH
see_also:
    - chef-automate completion - Generate the autocompletion script for the specified shell
supported_on: Bastion
