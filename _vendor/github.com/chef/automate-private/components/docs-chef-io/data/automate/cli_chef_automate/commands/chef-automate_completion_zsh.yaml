name: chef-automate completion zsh
synopsis: Generate the autocompletion script for zsh
usage: chef-automate completion zsh [flags]
description: |
    Generate the autocompletion script for the zsh shell.

    If shell completion is not already enabled in your environment you will need
    to enable it.  You can execute the following once:

    	echo "autoload -U compinit; compinit" >> ~/.zshrc

    To load completions in your current shell session:

    	source <(chef-automate completion zsh)

    To load completions for every new session, execute once:

    #### Linux:

    	chef-automate completion zsh > "${fpath[1]}/_chef-automate"

    #### macOS:

    	chef-automate completion zsh > $(brew --prefix)/share/zsh/site-functions/_chef-automate

    You will need to start a new shell for this setup to take effect.
options:
    - name: help
      shorthand: h
      default_value: "false"
      usage: help for zsh
    - name: no-descriptions
      default_value: "false"
      usage: disable completion descriptions
inherited_options:
    - name: debug
      shorthand: d
      default_value: "false"
      usage: Enable debug output
    - name: no-check-version
      default_value: "false"
      usage: Disable version check
    - name: result-json
      usage: Write command result as JSON to PATH
see_also:
    - chef-automate completion - Generate the autocompletion script for the specified shell
supported_on: Bastion
